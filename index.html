<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Support Connect</title>

    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="page-wrapper">

        <header class="hero-box">
            <div class="scrolling-banner">
                <div class="scrolling-text">
                    Do you need help? • Food support • Housing assistance • Mental health services • Shelter for tonight • Local community resources •
                </div>
            </div>

            <h1>Community Support Connect</h1>
            <p class="subtitle">Find local support services quickly and easily.</p>
        </header>

        <main class="service-grid">

            <button class="service-card" data-service="Housing Assistance">
                <span class="icon">🏠</span>
                <h2>Housing</h2>
                <p>Rental assistance and housing support.</p>
            </button>

            <button class="service-card" data-service="Mental Health Support">
                <span class="icon">🧠</span>
                <h2>Mental Health</h2>
                <p>Counseling and emotional support resources.</p>
            </button>

            <button class="service-card" data-service="Food Assistance">
                <span class="icon">🍽️</span>
                <h2>Food Help</h2>
                <p>Food shelves and meal programs nearby.</p>
            </button>

            <button class="service-card" data-service="Emergency Shelter">
                <span class="icon">🛏️</span>
                <h2>Shelter</h2>
                <p>Find overnight shelter and emergency housing.</p>
            </button>

        </main>

        <section class="result-box">
            <h3 id="selectedService">Select a service above</h3>
            <p id="serviceMessage">
                We will help connect you with trusted local community resources.
            </p>
        </section>

    </div>

    <script src="scripts.js"></script>
</body>
</html>
